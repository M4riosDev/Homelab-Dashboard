version: "3.9"

services:
  backend:
    build: ./backend
    container_name: dashboard-backend
    restart: unless-stopped
    ports:
      - "3001:3001"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      - PORT=3001
      - NODE_NAME=${HOSTNAME}
    networks:
      - dashboard-net

  frontend:
    build: ./frontend
    container_name: dashboard-frontend
    restart: unless-stopped
    ports:
      - "8080:80"
    depends_on:
      - backend
    networks:
      - dashboard-net

networks:
  dashboard-net:
    driver: bridge
