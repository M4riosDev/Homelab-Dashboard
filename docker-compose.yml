version: "3.9"

services:
  backend:
    build: ./backend
    container_name: dashboard-backend
    restart: unless-stopped
    ports:
      - "3001:3001"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - shortcuts-data:/data
    environment:
      - PORT=3001
      - NODE_NAME=${HOSTNAME}
    networks:
      - dashboard-net
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3001/api/health"]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 10s

  frontend:
    build: ./frontend
    container_name: dashboard-frontend
    restart: unless-stopped
    ports:
      - "8080:80"
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - dashboard-net

networks:
  dashboard-net:
    driver: bridge

volumes:
  shortcuts-data: