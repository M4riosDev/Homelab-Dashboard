version: "3.9"

services:
  backend:
    build: ./backend
    container_name: dashboard-backend
    restart: unless-stopped
    ports:
      - "3001:3001"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - dashboard-data:/data
    environment:
      - PORT=3001
      - NODE_NAME=${HOSTNAME}
      - JWT_SECRET=${JWT_SECRET:-change-me-please-use-a-long-random-secret}
      - USERS_FILE=/data/users.json
      - SHORTCUTS_FILE=/data/shortcuts.json
    networks:
      - dashboard-net
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3001/api/health', r => process.exit(r.statusCode === 200 ? 0 : 1)).on('error', () => process.exit(1))"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 15s

  frontend:
    build: ./frontend
    container_name: dashboard-frontend
    restart: unless-stopped
    ports:
      - "8080:80"
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - dashboard-net

networks:
  dashboard-net:
    driver: bridge

volumes:
  dashboard-data:
